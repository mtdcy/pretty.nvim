# markdownlint 配置 - 只检查严重错误
# 作者：Chen Fang + X5 Agent

# 默认关闭所有规则，只启用重要的
default: true

# ==================== 启用的规则（严重错误）====================
# MD009/no-trailing-spaces : 行尾空格
MD009:
  br_spaces: 2
  strict: false

# MD010/no-hard-tabs : 硬制表符（应使用空格）
MD010:
  code_blocks: true

# MD011/no-reversed-links : 反向链接语法错误
MD011: true

# MD014/commands-show-output : 命令前缺少 $ 符号
MD014: true

# MD018/no-missing-space-atx : 标题  # 后缺少空格
MD018: true

# MD020/no-missing-space-closed-atx : 闭合标题  # 内缺少空格
MD020: true

# MD023/heading-start-left : 标题必须从行首开始
MD023: true

# MD037/no-space-in-emphasis : 强调标记内有空格
MD037: true

# MD038/no-space-in-code : 代码 span 内有空格
MD038: true

# MD039/no-space-in-links : 链接文本内有空格
MD039: true

# MD042/no-empty-links : 空链接
MD042: true

# MD045/no-alt-text : 图片缺少 alt 文本
MD045: true

# MD049/emphasis-style : 强调风格不一致
MD049:
  style: consistent

# MD050/strong-style : 粗体风格不一致
MD050:
  style: consistent

# ==================== 明确禁用的规则（不重要）====================

# --- 空行相关规则（全部禁用）---
# MD012/no-multiple-blanks : 多个连续空行（允许）
MD012: false

# MD022/blanks-around-headings : 标题周围要有空行（太严格）
MD022: false

# MD031/blanks-around-fences : 代码围栏周围要有空行（太严格）
MD031: false

# MD032/blanks-around-lists : 列表周围要有空行（太严格）
MD032: false

# MD047/single-trailing-newline : 文件末尾换行（不强制）
MD047: false

# --- 其他不重要的规则 ---
# MD013/line-length : 行长度限制（太严格，禁用）
MD013: false

# MD024/no-duplicate-heading : 重复标题（有时是故意的）
MD024: false

# MD033/no-inline-html : 内联 HTML（有时需要）
MD033: false

# MD048/code-fence-style : 代码围栏风格（不强制）
MD048: false
