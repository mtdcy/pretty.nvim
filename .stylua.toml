# =============================================================================
# StyLua 配置文件
# =============================================================================
# 说明：
#   StyLua 是一个 opinionated 的 Lua 代码格式化工具
#   类似 JavaScript 的 Prettier
#
# 官方文档：https://github.com/JohnnyMorganz/StyLua
# =============================================================================

# 每行最大字符数
column_width = 120

# 行尾格式：Unix = LF, Windows = CRLF
line_endings = "Unix"

# 缩进类型：Spaces 或 Tabs
indent_type = "Spaces"

# 缩进空格数
indent_width = 2

# 引号风格：
# - AutoPreferDouble = 优先双引号，必要时使用单引号
# - AutoPreferSingle = 优先单引号，必要时使用双引号
# - ForceDouble = 强制双引号
# - ForceSingle = 强制单引号
quote_style = "AutoPreferDouble"

# 函数调用括号风格：
# - Always = 总是使用括号：foo()
# - NoSingleString = 单个字符串参数时不使用：foo "string"
# - NoSingleTable = 单个表参数时不使用：foo {}
# - None = 尽可能不使用：foo "string" 或 foo {}
call_parentheses = "Always"

# 是否格式化被 [[...]] 包裹的多行字符串
collapse_simple_statement = "Never"
