---
# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
# =============================================================================
# LazyGit 配置文件 - pretty.nvim
# =============================================================================
# 文档：https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md
#
# 按键绑定约定：
#   - 空字符串 '' = 禁用该功能
#   - 保留原默认值作为注释，方便参考
#   - 自定义按键绑定已配置
# =============================================================================

# --- 基本设置 ---
quitOnTopLevelReturn: false
promptToReturnFromSubprocess: false
disableStartupPopups: true

# --- GUI 设置 ---
gui:
  border: 'rounded' # one of 'single' | 'double' | 'rounded' | 'hidden'
  screenMode: 'normal' # one of 'normal' | 'half' | 'full'
  mainPanelSplitMode: 'flexible' # one of 'horizontal' | 'flexible' | 'vertical'
  enlargedSideViewLocation: 'left' # one of 'left' | 'top'
  nerdFontsVersion: 3
  showFileIcons: true
  showPanelJumps: true
  scrollOffMargin: 2
  scrollOffBehavior: 'margin' # one of 'margin' | 'jump'
  showBranchCommitHash: false
  showDivergenceFromBaseBranch: 'arrowAndNumber' # one of 'none' | 'onlyArrow' | 'arrowAndNumber'
  theme:
    activeBorderColor:
      - red
      - bold
    selectedLineBgColor:
      - reverse

os:
  editPreset: 'nvim'
  editInTerminal: true

# --- 自定义命令 ---
customCommands:
  - key: 'p'
    context: 'global'
    command: 'git fetch --prune origin --tags && git rebase'
    loadingText: '♻️ Pull and rebase and fetching tags'
  - key: 'c'
    context: "files"
    command: "git commit -e"  # 这样就可以使用 .gitcommit.txt
    output: terminal
  - key: '<c-o>'
    context: "global"
    command: "nopen.sh {{ .SelectedFile.Name }}" # open file with nvim
    description: "\U0001F4A1 Open file inside nvim"

# --- Git 设置 ---
git:
  mainBranches:
    - main
    - master
  autoFetch: false
  autoRefresh: false
  autoStageResolvedConflicts: true
  fetchAll: true
  disableForcePushing: false
  parseEmoji: true
  overrideGpg: false
  branchLogCmd: 'git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=oneline {{branchName}} --'
  externalDiffCommand: 'nvim -d'
  pagers:
    - colorArg: always
      useConfig: false
      pager: 'delta --paging=never --color-only'
  commit:
    signOff: false
    autoWrapCommitMessage: false
  merging:
    manualCommit: false
    args: '--no-ff --no-edit'
    squashMergeMessage: 'Squash merge {{selectedRef}} into {{currentBranch}}'
  log:
    showGraph: 'always'
    showWholeGraph: true
  allBranchesLogCmds:
    - git log --graph --all --color=always --abbrev-commit --decorate --date=relative --pretty=oneline

# =============================================================================
# 按键绑定配置
# =============================================================================
# 约定：
#   - 小写字母 = 本地操作
#   - 大写字母 = 远程操作
#   - 空字符串 '' = 禁用（原默认值保留在注释中）
# =============================================================================
keybinding:
  # --- 全局通用绑定 ---
  universal:
    # 面板跳转
    jumpToBlock:
      - '' # 默认：'' - 第一个面板
      - '1' # 默认：'1' - 第二个面板
      - '2' # 默认：'2' - 第三个面板
      - '3' # 默认：'3' - 第四个面板
      - '4' # 默认：'4' - 第五个面板
    # 基本导航
    quit: 'q' # 默认：'q' - 退出
    quit-alt1: 'Q' # 默认：'' - 备用退出
    return: '<esc>' # 默认：'<esc>' - 返回上级菜单
    prevItem: '<up>' # 默认：'<up>' - 上一行
    nextItem: '<down>' # 默认：'<down>' - 下一行
    # 面板切换
    togglePanel: '<tab>' # 默认：'<tab>' - 切换到下一个面板
    prevBlock: 'h' # 默认：'h' - 左侧面板
    nextBlock: 'l' # 默认：'l' - 右侧面板
    prevBlock-alt: '' # 默认：'' - 备用左侧
    nextBlock-alt: '' # 默认：'' - 备用右侧
    prevItem-alt: 'k' # 默认：'k' - 上一行（备用）
    nextItem-alt: 'j' # 默认：'j' - 下一行（备用）
    # Tab 切换
    nextTab: ']' # 默认：']' - 下一个 Tab
    prevTab: '[' # 默认：'[' - 上一个 Tab
    # 页面导航
    prevPage: '<pgup>' # 默认：'<pgup>' - 上一页
    nextPage: '<pgdown>' # 默认：'<pgdown>' - 下一页
    gotoTop: '<home>' # 默认：'<home>' - 顶部
    gotoBottom: '<end>' # 默认：'<end>' - 底部
    # 菜单
    optionMenu: '?' # 默认：'?' - 帮助菜单
    extrasMenu: '@' # 默认：'@' - 额外菜单
    # 选择操作
    select: '<space>' # 默认：'<space>' - 选择
    goInto: '<enter>' # 默认：'<enter>' - 进入
    confirm: '<enter>' # 默认：'<enter>' - 确认
    # Git 操作
    pullFiles: '' # 默认：'p' - 已禁用（使用自定义命令）
    pushFiles: 'P' # 默认：'P' - 推送（强制）
    # 编辑器
    submitEditorText: '<enter>' # 默认：'<enter>' - 提交编辑器文本
    # 基本操作
    remove: 'd' # 默认：'d' - 删除
    new: 'n' # 默认：'n' - 新建
    edit: 'e' # 默认：'e' - 编辑
    undo: 'u' # 默认：'u' - 撤销
    redo: 'U' # 默认：'U' - 重做
    refresh: 'r' # 默认：'r' - 刷新
    # 搜索
    nextMatch: 'n' # 默认：'n' - 下一个匹配
    prevMatch: 'N' # 默认：'N' - 上一个匹配
    # 其他
    openRecentRepos: '' # 默认：'' - 打开最近仓库
    toggleRangeSelect: 'v' # 默认：'v' - 范围选择
    executeShellCommand: ':' # 默认：':' - 执行 shell 命令
    # 屏幕模式
    nextScreenMode: '=' # 默认：'\' - 下一个屏幕模式
    prevScreenMode: '-' # 默认：'q' - 上一个屏幕模式（与 quit 冲突，需注意）
    # 剪贴板操作
    copyToClipboard: '' # 默认：'<c-o>' - 复制到剪贴板
    # 滚动操作
    scrollLeft: '' # 默认：'H' - 向左滚动
    scrollRight: '' # 默认：'L' - 向右滚动
    scrollUpMain: '' # 默认：'<pgup>' - 主面板向上滚动
    scrollDownMain: '' # 默认：'<pgdown>' - 主面板向下滚动
    scrollUpMain-alt1: '' # 默认：'K' - 主面板向上滚动（备用）
    scrollDownMain-alt1: '' # 默认：'J' - 主面板向下滚动（备用）
    # 差异视图操作
    openFile: 'o' # 默认：'o' - 打开文件
    createRebaseOptionsMenu: '' # 默认：'m' - 创建 rebase 选项菜单
    createPatchOptionsMenu: '' # 默认：'<c-p>' - 创建 patch 选项菜单
    filteringMenu: '' # 默认：'<c-s>' - 过滤菜单
    diffingMenu: '' # 默认：'W' - 差异菜单
    diffingMenu-alt: '' # 默认：'<c-e>' - 差异菜单（备用，已废弃）
    rangeSelectUp: '' # 默认：'<s-up>' - 范围选择向上
    rangeSelectDown: '' # 默认：'<s-down>' - 范围选择向下
    increaseContextInDiffView: '}' # 默认：'}' - 增加差异视图上下文
    decreaseContextInDiffView: '{' # 默认：'{' - 减少差异视图上下文
    toggleWhitespaceInDiffView: '' # 默认：'<c-w>' - 切换空白字符显示
    quitWithoutChangingDirectory: '' # 默认：'Q' - 退出不切换目录
  # --- 状态面板 ---
  status:
    checkForUpdate: '' # 默认：'u' - 检查更新
    recentRepos: '' # 默认：'<enter>' - 最近仓库
  # --- 文件面板 ---
  files:
    # 核心操作（保留）
    ignoreFile: 'i' # 默认：'i' - 忽略文件
    commitChanges: 'c' # 默认：'c' - 提交更改
    amendLastCommit: 'a' # 默认：'A' - 修正上次提交
    toggleStagedAll: '<space>' # 默认：'<space>' - 切换全部暂存
    # 禁用的操作
    fetch: '' # 默认：'f' - 获取
    refreshFiles: '' # 默认：'R' - 刷新文件
    openMergeOptions: '' # 默认：'M' - 打开合并选项
    confirmDiscard: '' # 默认：'x' - 确认丢弃
    toggleTreeView: '' # 默认：'`' - 切换树视图
    stashAllChanges: '' # 默认：'s' - 暂存所有更改
    viewStashOptions: '' # 默认：'S' - 查看暂存选项
    viewResetOptions: '' # 默认：'D' - 查看重置选项
    openStatusFilter: '' # 默认：'<c-b>' - 打开状态过滤器
    findBaseCommitForFixup: '' # 默认：'<c-f>' - 查找基础提交
    commitChangesWithEditor: '' # 默认：'C' - 使用编辑器提交
    commitChangesWithoutHook: '' # 默认：'w' - 不使用 hook 提交
    # 剪贴板操作
    copyToClipboard: '' # 默认：'y' - 复制到剪贴板
    # 文件操作
    openFile: 'o' # 默认：'o' - 打开文件
    editFile: '' # 默认：'e' - 编辑文件
    openDiffTool: '' # 默认：'<c-t>' - 打开外部 diff 工具
    # 其他操作
    discardAllChanges: '' # 默认：'D' - 丢弃所有更改
    collapseAll: '' # 默认：'-' - 折叠所有
    expandAll: '' # 默认：'=' - 展开所有
  # --- 分支面板 ---
  branches:
    # 分支操作
    checkoutBranchByName: 'c' # 默认：'c' - 按名称检出分支
    renameBranch: 'e' # 默认：'R' - 重命名分支
    mergeIntoCurrentBranch: 'm' # 默认：'M' - 合并到当前分支
    rebaseBranch: 'r' # 默认：'r' - 变基分支
    # 远程操作
    fetchRemote: 'f' # 默认：'f' - 获取远程
    setUpstream: 'e' # 默认：'u' - 设置上游
    # 标签操作
    createTag: 't' # 默认：'T' - 创建标签
    pushTag: 'P' # 默认：'P' - 推送标签
    # 禁用的操作
    forceCheckoutBranch: '' # 默认：'F' - 强制检出分支
    fastForward: '' # 默认：'f' - 快进合并
    createPullRequest: '' # 默认：'o' - 创建 Pull Request
    viewPullRequestOptions: '' # 默认：'O' - 查看 Pull Request 选项
    viewGitFlowOptions: '' # 默认：'i' - 查看 Git Flow 选项
    checkoutPreviousBranch: '' # 默认：'-' - 检出上一个分支
    moveCommitsToNewBranch: '' # 默认：'N' - 移动提交到新分支
    # 剪贴板操作
    copyPullRequestURL: '' # 默认：'<c-y>' - 复制 PR URL
  # --- 提交面板 ---
  commits:
    # 提交操作
    checkoutCommit: '' # 默认：'<space>' - 检出提交
    # 保留的快捷键
    renameCommit: 'e' # 默认：'r' - 重命名提交（reword）
    revertCommit: 'r' # 默认：'t' - 还原提交
    openLogMenu: 'l' # 默认：'' - 打开日志菜单
    viewResetOptions: '<space>' # 默认：'g' - 查看重置选项 ← 这个是我们需要的
    # Fixup 操作
    createFixupCommit: 'f' # 默认：'f' - 创建 fixup 提交
    squashAboveCommits: 'F' # 默认：'S' - 压缩上方提交
    squashDown: 's' # 默认：'' - 向下压缩
    amendToCommit: '' # 默认：'A' - 修正到提交
    tagCommit: '' # 默认：'T' - 标签提交
    # 移动提交
    moveUpCommit: 'K' # 默认：'' - 向上移动提交
    moveDownCommit: 'J' # 默认：'' - 向下移动提交
    cherryPickCopy: '<c-c>' # 默认：'C' - 复制提交（cherry-pick）
    pasteCommits: '<c-v>' # 默认：'V' - 粘贴提交
    # 其他操作
    moveCommitsToNewBranch: '' # 默认：'N' - 移动提交到新分支
    createBranchOffCurrent: '' # 默认：'n' - 从当前提交创建分支
    # 禁用的操作
    renameCommitWithEditor: '' # 默认：'R' - 使用编辑器重命名提交
    markCommitAsFixup: '' # 默认：'f' - 标记为 fixup
    pickCommit: '' # 默认：'p' - 选择提交（rebase 中）
    copyCommitMessageToClipboard: '' # 默认：'' - 复制提交消息
    amendAttributeMenu: '' # 默认：'a' - 修正属性菜单
    resetCherryPick: '' # 默认：'' - 重置 cherry-pick
    viewBisectOptions: '' # 默认：'b' - 查看二分选项
    # 剪贴板操作
    copyCommitSha: '' # 默认：'<c-o>' - 复制提交 SHA
    copyCommitDiff: '' # 默认：'<c-c>' - 复制提交 diff
    copyCommitAttribute: '' # 默认：'y' - 复制提交属性
  # --- 暂存面板 ---
  stash:
    popStash: 'u' # 默认：'g' - 弹出暂存
    renameStash: 'e' # 默认：'r' - 重命名暂存
    newStash: '' # 默认：'n' - 新建暂存
  # --- 提交文件面板 ---
  commitFiles:
    checkoutCommitFile: '' # 默认：'c' - 检出提交文件
    # 剪贴板操作
    copyCommitSha: '' # 默认：'<c-o>' - 复制提交 SHA
    copyCommitDiff: '' # 默认：'<c-c>' - 复制提交 diff
  # --- 主面板（差异视图）---
  main:
    toggleSelectHunk: '' # 默认：'a' - 切换选择 hunk
    pickBothHunks: '' # 默认：'b' - 选择两个 hunks
    editHunk: '' # 默认：'e' - 编辑 hunk
  # --- 子模块面板 ---
  submodules:
    init: 'i' # 默认：'i' - 初始化
    update: 'p' # 默认：'u' - 更新
    bulkMenu: '' # 默认：'b' - 批量菜单
    open: '' # 默认：'<enter>' - 打开子模块
  # --- 提交消息面板 ---
  commitMessage:
    commitMenu: '' # 默认：'' - 提交菜单
  # --- 修正属性面板 ---
  amendAttribute:
    addCoAuthor: '' # 默认：'c' - 添加共同作者
    resetAuthor: '' # 默认：'a' - 重置作者
    setAuthor: '' # 默认：'A' - 设置作者
